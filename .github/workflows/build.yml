name: Build GeoSite Files

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'data/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Clone builder
        run: |
          git clone https://github.com/v2fly/domain-list-community.git /tmp/builder

      - name: Copy our categories
        run: |
          cp -r data/* /tmp/builder/data/

      - name: Build geosite.dat
        run: |
          cd /tmp/builder
          go run ./ -datapath ./data -outputname geosite.dat

      - name: Copy output
        run: |
          cp /tmp/builder/geosite.dat geosite.dat

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build"
          files: geosite.dat
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
