name: Build Custom Geosite File

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version: '1.20'
      
      # ===> НОВЫЙ ШАГ ДЛЯ ИСПРАВЛЕНИЯ ОШИБКИ <===
      # Эта команда решает проблему с "terminal prompts disabled"
      - name: Configure Go to use Git for GitHub
        run: git config --global url."https://".insteadOf git://

      - name: Install domain-list-compiler (dlc)
        run: go install github.com/v2fly/dlc@latest

      - name: Compile domain lists
        run: >
          dlc -datapath ./data -outputpath geosite.dat
          -entry ru-direct:direct-list.txt
          -entry ru-proxy:proxy-list.txt

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: "Latest Build"
          body: "Автоматически скомпилированный geosite.dat. Содержит списки ru-direct и ru-proxy."
          files: geosite.dat
          prerelease: false
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
