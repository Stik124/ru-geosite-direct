name: Build Custom Geosite File

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'data/direct-list.txt'
      - 'data/proxy-list.txt'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Clone builder
        run: |
          git clone https://github.com/v2fly/domain-list-community.git /tmp/builder

      - name: Copy files
        run: |
          cp -r data /tmp/builder/

      - name: Build
        run: |
          cd /tmp/builder
          go run ./ -datapath ./data -outputdir ./output -outputname geosite.dat

      - name: Show output
        run: |
          echo "=== Что создал сборщик ==="
          find /tmp/builder/output -type f

      - name: Copy output
        run: |
          cp /tmp/builder/output/geosite.dat geosite.dat

      - name: Show file size
        run: |
          ls -lh geosite.dat

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build"
          files: geosite.dat
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
