name: Build GeoSite Files

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'data/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true                    # встроенное кэширование

      - name: Cache Go modules and build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Build geosite.dat
        run: |
          go run github.com/v2fly/domain-list-community@latest \
            -datapath ./data \
            -outputname geosite.dat

      - name: Verify generated file
        run: |
          ls -lh geosite.dat
          echo "File size: $(wc -c < geosite.dat) bytes"

      - name: Create Release
        uses: softprops/action-gh-release@v3   # обновлено до v3 (Node 24)
        with:
          tag_name: latest
          name: "Latest Build"
          files: geosite.dat
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
