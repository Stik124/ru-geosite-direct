name: Build Custom Geosite File

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Шаг 1: Загружаем код вашего репозитория
      - name: Checkout repository
        uses: actions/checkout@v3

      # Шаг 2: Устанавливаем Go
      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version: '1.20'
      
      # Шаг 3: Устанавливаем КОНКРЕТНУЮ ВЕРСИЮ компилятора через Go Proxy
      # Это окончательное решение проблемы.
      - name: Install domain-list-compiler (dlc)
        env:
          GOPROXY: "https://proxy.golang.org,direct"
        run: go install github.com/v2fly/dlc@v2.2.0

      # Шаг 4: Компилируем ваши списки
      - name: Compile domain lists
        run: >
          dlc -datapath ./data -outputpath geosite.dat
          -entry ru-direct:direct-list.txt
          -entry ru-proxy:proxy-list.txt

      # Шаг 5: Публикуем артефакт в релизах
      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: "Latest Build"
          body: "Автоматически скомпилированный geosite.dat. Содержит списки ru-direct и ru-proxy."
          files: geosite.dat
          prerelease: false
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
